org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true
# Désactiver le daemon Kotlin qui plante
kotlin.incremental=false
kotlin.daemon.jvmopts=-Xmx2G
# Forcer AAPT2 à être plus patient sur Windows
android.aapt2FromMavenOverride=
